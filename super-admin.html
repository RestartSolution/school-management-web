<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans flex">

    <!-- Sidebar -->
    <div class="w-64 bg-slate-900 h-screen text-white p-5 hidden md:flex flex-col justify-between">
        <div>
            <h2 class="text-xl font-bold mb-8 text-indigo-400 flex items-center"><i class="fa-solid fa-user-shield mr-2"></i> Super Admin</h2>
            <nav class="space-y-2">
                <a href="#" class="block p-3 rounded bg-slate-800 text-sm font-medium"><i class="fa-solid fa-school mr-2"></i> Registered Institutions</a>
            </nav>
        </div>
        <div>
            <a href="index.html" class="block p-3 rounded bg-red-600 hover:bg-red-700 text-center font-bold text-sm transition"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 p-6 md:p-8 overflow-y-auto h-screen">
        <header class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-wide">Main Control Panel</h1>
            <span class="bg-indigo-50 border border-indigo-100 text-indigo-700 px-4 py-1.5 rounded-lg font-bold text-sm">Total Active Schools: 2</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Add/Approve School Form -->
            <div class="bg-white p-6 rounded-xl shadow-sm border lg:col-span-1">
                <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b"><i class="fa-solid fa-plus-circle text-orange-600 mr-1"></i> Register New Institution</h3>
                <form id="schoolRegForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Institution Name</label>
                        <input type="text" id="schoolName" class="w-full p-2.5 border rounded-lg text-sm outline-none focus:border-orange-500" placeholder="e.g., St. Xavier's High School" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Admin Email</label>
                        <input type="email" id="schoolEmail" class="w-full p-2.5 border rounded-lg text-sm outline-none focus:border-orange-500" placeholder="admin@school.com" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Auto-Generated School ID</label>
                        <input type="text" id="generatedId" class="w-full p-2.5 bg-gray-50 border rounded-lg text-sm text-orange-600 font-bold tracking-wider outline-none" readonly placeholder="Click button below">
                    </div>
                    <button type="button" onclick="generateSchoolID()" class="w-full bg-slate-700 text-white p-2.5 rounded-lg text-xs font-bold hover:bg-slate-800 transition">1. Generate Unique ID</button>
                    <button type="submit" class="w-full bg-orange-600 text-white p-2.5 rounded-lg text-sm font-bold hover:bg-orange-700 transition shadow-md shadow-orange-100">2. Approve & Save</button>
                </form>
            </div>

            <!-- Registered Schools List -->
            <div class="bg-white p-6 rounded-xl shadow-sm border lg:col-span-2">
                <h3 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b"><i class="fa-solid fa-list text-emerald-600 mr-1"></i> Approved Institution Directory</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="bg-gray-50 text-gray-700 font-bold uppercase text-xs">
                            <tr>
                                <th class="p-3">School ID</th>
                                <th class="p-3">Institution Name</th>
                                <th class="p-3">Admin Email</th>
                                <th class="p-3">Status</th>
                            </tr>
                        </thead>
                        <tbody id="schoolTableBody" class="divide-y">
                            <tr>
                                <td class="p-3 font-bold text-orange-600 tracking-wider">SCH-8492</td>
                                <td class="p-3 font-semibold text-gray-900">Kolkata Public School</td>
                                <td class="p-3 text-xs">kps@gmail.com</td>
                                <td class="p-3"><span class="bg-green-100 text-green-800 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full">Active</span></td>
                            </tr>
                            <tr>
                                <td class="p-3 font-bold text-orange-600 tracking-wider">SCH-3104</td>
                                <td class="p-3 font-semibold text-gray-900">Nabadiganta Vidyapith</td>
                                <td class="p-3 text-xs">ndv@gmail.com</td>
                                <td class="p-3"><span class="bg-green-100 text-green-800 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full">Active</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateSchoolID() {
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('generatedId').value = 'SCH-' + randomNum;
        }

        document.getElementById('schoolRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('generatedId').value;
            const name = document.getElementById('schoolName').value;
            const email = document.getElementById('schoolEmail').value;

            if(!id) {
                alert('Please generate a School ID first!');
                return;
            }

            const table = document.getElementById('schoolTableBody');
            const newRow = `<tr>
                <td class="p-3 font-bold text-orange-600 tracking-wider">${id}</td>
                <td class="p-3 font-semibold text-gray-900">${name}</td>
                <td class="p-3 text-xs">${email}</td>
                <td class="p-3"><span class="bg-green-100 text-green-800 text-[10px] font-bold uppercase px-2 py-0.5 rounded-full">Active</span></td>
            </tr>`;
            
            table.innerHTML += newRow;
            document.getElementById('schoolRegForm').reset();
            alert('Institution successfully registered!');
        });
    </script>
</body>
</html>
