<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সুপার এডমিন প্যানেল</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex">

    <!-- সাইডবার -->
    <div class="w-64 bg-slate-900 h-screen text-white p-5 hidden md:block">
        <h2 class="text-xl font-bold mb-8 text-indigo-400"><i class="fa-solid fa-user-shield mr-2"></i> সুপার এডমিন</h2>
        <nav class="space-y-2">
            <a href="#" class="block p-3 rounded bg-slate-800"><i class="fa-solid fa-school mr-2"></i> রেজিস্টার্ড স্কুলসমূহ</a>
            <a href="index.html" class="block p-3 rounded bg-red-600 hover:bg-red-700 text-center mt-10"><i class="fa-solid fa-right-from-bracket mr-2"></i> লগআউট</a>
        </nav>
    </div>

    <!-- মেইন কন্টেন্ট -->
    <div class="flex-1 p-6 md:p-8 overflow-y-auto h-screen">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">মেইন কন্ট্রোল প্যানেল (Super Admin)</h1>
            <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded font-semibold">টোটাল স্কুল: ২</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- নতুন স্কুল রেজিস্টার করার ফর্ম -->
            <div class="bg-white p-6 rounded-lg shadow lg:col-span-1">
                <h3 class="text-lg font-bold text-gray-700 mb-4 border-b pb-2"><i class="fa-solid fa-plus-circle text-indigo-600 mr-1"></i> নতুন স্কুল অনুমোদন করুন</h3>
                <form id="schoolRegForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">স্কুলের নাম</label>
                        <input type="text" id="schoolName" class="mt-1 block w-full p-2 border rounded" placeholder="যেমন: সেন্ট জেভিয়ার্স হাই স্কুল" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">এডমিন ইমেইল</label>
                        <input type="email" id="schoolEmail" class="mt-1 block w-full p-2 border rounded" placeholder="admin@school.com" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">অটো জেনারেটেড স্কুল ID</label>
                        <input type="text" id="generatedId" class="mt-1 block w-full p-2 bg-gray-100 border rounded text-indigo-600 font-bold" readonly>
                    </div>
                    <button type="button" onclick="generateSchoolID()" class="w-full bg-gray-700 text-white p-2 rounded text-sm hover:bg-gray-800">১. আইডি জেনারেট করুন</button>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-2 rounded font-semibold hover:bg-indigo-700">২. স্কুল রেজিস্টার করুন</button>
                </form>
            </div>

            <!-- রেজিস্টার্ড স্কুলের তালিকা -->
            <div class="bg-white p-6 rounded-lg shadow lg:col-span-2">
                <h3 class="text-lg font-bold text-gray-700 mb-4 border-b pb-2"><i class="fa-solid fa-list text-emerald-600 mr-1"></i> অনুমোদিত স্কুল লিস্ট</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="bg-gray-50 text-gray-700">
                            <tr>
                                <th class="p-3">স্কুল ID</th>
                                <th class="p-3">স্কুলের নাম</th>
                                <th class="p-3">এডমিন ইমেইল</th>
                                <th class="p-3">স্ট্যাটাস</th>
                            </tr>
                        </thead>
                        <tbody id="schoolTableBody" class="divide-y">
                            <tr>
                                <td class="p-3 font-bold text-indigo-600">SCH-8492</td>
                                <td class="p-3 font-medium text-gray-900">কলকাতা পাবলিক স্কুল</td>
                                <td class="p-3">kps@gmail.com</td>
                                <td class="p-3"><span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">অ্যাক্টিভ</span></td>
                            </tr>
                            <tr>
                                <td class="p-3 font-bold text-indigo-600">SCH-3104</td>
                                <td class="p-3 font-medium text-gray-900">নবদিগন্ত বিদ্যাপীঠ</td>
                                <td class="p-3">ndv@gmail.com</td>
                                <td class="p-3"><span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">অ্যাক্টিভ</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // অটোমেটিক ইউনিক স্কুল আইডি তৈরি করার লজিক
        function generateSchoolID() {
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('generatedId').value = 'SCH-' + randomNum;
        }

        // টেবিলে নতুন স্কুল যোগ করার ডেমো লজিক
        document.getElementById('schoolRegForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('generatedId').value;
            const name = document.getElementById('schoolName').value;
            const email = document.getElementById('schoolEmail').value;

            if(!id) {
                alert('দয়া করে আগে আইডি জেনারেট করুন!');
                return;
            }

            const table = document.getElementById('schoolTableBody');
            const newRow = `<tr>
                <td class="p-3 font-bold text-indigo-600">${id}</td>
                <td class="p-3 font-medium text-gray-900">${name}</td>
                <td class="p-3">${email}</td>
                <td class="p-3"><span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">অ্যাক্টিভ</span></td>
            </tr>`;
            
            table.innerHTML += newRow;
            document.getElementById('schoolRegForm').reset();
            alert('নতুন স্কুল সফলভাবে রেজিস্টার করা হয়েছে!');
        });
    </script>
</body>
</html>
