<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School Portal - Secure Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans flex items-center justify-center h-screen overflow-hidden text-slate-800">

    <!-- Orange-Purple Luxury Light Dynamic Background Glow -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_rgba(249,115,22,0.12),_transparent_45%),_radial-gradient(circle_at_bottom_left,_rgba(147,51,234,0.12),_transparent_45%)] z-0"></div>

    <!-- Login Card -->
    <div class="w-full max-w-md bg-white/90 border border-purple-100 p-8 rounded-3xl shadow-xl shadow-purple-950/5 backdrop-blur-xl z-10 space-y-6 relative">
        
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-linear-to-br from-orange-500 to-purple-600 text-white rounded-2xl flex items-center justify-center text-md mx-auto shadow-md shadow-orange-500/20">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase mt-4">EduSphere Nexus</h1>
            <p class="text-xs text-slate-400 font-medium">Enter credentials to authenticate session tunnel.</p>
        </div>

        <form id="loginPortalForm" class="space-y-4">
            <!-- Username Input -->
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5">Secure Username / Node ID</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 text-sm"><i class="fa-solid fa-terminal"></i></span>
                    <input type="text" id="portalUsername" class="w-full bg-slate-50 border border-slate-200 focus:border-orange-500 focus:bg-white rounded-xl p-3 pl-11 text-sm font-bold text-slate-800 outline-none transition placeholder-slate-300" placeholder="e.g., subhankar_sarkar_7998 or SCH-8576" required>
                </div>
            </div>

            <!-- Password Input -->
            <div id="passwordFieldContainer">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1.5">Security Password Token</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 text-sm"><i class="fa-solid fa-key"></i></span>
                    <input type="password" id="portalPassword" class="w-full bg-slate-50 border border-slate-200 focus:border-purple-600 focus:bg-white rounded-xl p-3 pl-11 text-sm font-bold text-slate-800 outline-none transition placeholder-slate-300" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-linear-to-r from-orange-500 to-purple-600 text-white p-3.5 rounded-xl font-black text-xs uppercase tracking-wider hover:opacity-95 shadow-lg shadow-orange-500/20 transition duration-200 cursor-pointer flex items-center justify-center space-x-2">
                <span>Establish Session</span> <i class="fa-solid fa-arrow-right-to-bracket text-[10px]"></i>
            </button>
        </form>

        <div class="text-center pt-2 border-t border-slate-100">
            <a href="register.html" class="text-[11px] font-bold text-orange-600 hover:text-purple-600 transition uppercase tracking-wider">
                <i class="fa-solid fa-school-flag mr-1"></i> Register New Institution Pipeline
            </a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://iystmwxuzyhaoxmqlvof.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_1xHmvDN9TYSS3hoUGR7npQ_tUSa8dnh"; 
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginPortalForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const inputUsername = document.getElementById('portalUsername').value.trim();
            const inputPassword = document.getElementById('portalPassword').value.trim();

            // 👑 ১. সুপার অ্যাডমিন রুট (পাসওয়ার্ড: admin123)
            if (inputUsername === 'super-admin' || inputUsername === 'super_admin') {
                if (inputPassword === 'admin123') {
                    alert("Root Admin clearance verified.");
                    window.location.href = "super-admin.html";
                } else {
                    alert("Authentication Failure: Invalid Root Admin Password.");
                }
                return;
            }

            // 🏫 ২. ক্যাম্পাস ড্যাশবোর্ড রুট (স্কুল আইডি দিয়ে লগইন, পাসওয়ার্ড: school123)
            if (inputUsername.startsWith('SCH-')) {
                if (inputPassword === 'school123') {
                    alert(`Welcome Campus Node Administrator: ${inputUsername}`);
                    window.location.href = "school-admin.html";
                } else {
                    alert("Authentication Failure: Invalid Campus Admin Password.");
                }
                return;
            }

            // 🧑‍🏫 ৩. টিচার এবং স্টুডেন্ট ডাটাবেস রুট ভেরিফিকেশন
            const { data: userProfile, error } = await supabase
                .from('user_profiles')
                .select('role, username')
                .eq('username', inputUsername)
                .single();

            if (error || !userProfile) {
                alert("Network Rejection: Node username token invalid or unregistered.");
                return;
            }

            // টিচারের পাসওয়ার্ড ভেরিফিকেশন (ডিফল্ট: tchr_pass2026)
            if (userProfile.role === 'teacher') {
                if (inputPassword === 'tchr_pass2026') {
                    alert(`Welcome Faculty: ${userProfile.username}`);
                    window.location.href = "academic-hub.html";
                } else {
                    alert("Authentication Failure: Invalid Teacher Password.");
                }
            } else if (userProfile.role === 'student') {
                // স্টুডেন্টের পাসওয়ার্ড ছাড়াই সাময়িক বাইপাস (টেস্টিংয়ের জন্য)
                alert(`Welcome Student Node: ${userProfile.username}`);
                alert("Notice: Student dashboard UI layer under construction phase.");
            }
        });
    </script>
</body>
</html>
