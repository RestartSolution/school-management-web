<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div class="w-64 bg-emerald-950 text-white flex flex-col justify-between hidden md:flex">
        <div class="p-5">
            <h1 class="text-lg font-black tracking-wider mb-8 text-emerald-400 uppercase"><i class="fa-solid fa-graduation-cap mr-2"></i> Teacher Desk</h1>
            <nav class="space-y-1 text-sm font-medium">
                <a href="#" class="block p-3 rounded bg-emerald-800 transition"><i class="fa-solid fa-user-check mr-2"></i> Mark Attendance</a>
                <a href="#" class="block p-3 rounded hover:bg-emerald-900/50 transition"><i class="fa-solid fa-square-poll-vertical mr-2"></i> Gradebook & Marks</a>
            </nav>
        </div>
        <div class="p-5">
            <a href="index.html" class="block text-center bg-red-600 p-2.5 rounded-lg text-sm font-bold hover:bg-red-700 transition"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-y-auto">
        <!-- Top Header -->
        <header class="bg-white border-b p-4 flex justify-between items-center px-8 shadow-sm">
            <h2 class="text-xl font-bold text-gray-800">Faculty Panel</h2>
            <div class="flex items-center space-x-4 text-sm">
                <span class="text-gray-600 font-semibold">Teacher: Prof. A. Bose</span>
                <span class="bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded font-bold">ID: T-882</span>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="p-6 space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                
                <!-- Attendance Sheet -->
                <div class="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-calendar-check text-emerald-600 mr-2"></i> Daily Attendance (Class 5 - A)</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-gray-600">
                            <thead class="bg-gray-50 text-gray-700 font-bold uppercase text-xs">
                                <tr>
                                    <th class="p-3">Roll</th>
                                    <th class="p-3">Student Name</th>
                                    <th class="p-3 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y text-xs">
                                <tr>
                                    <td class="p-3 font-bold">01</td>
                                    <td class="p-3 font-medium text-gray-900">Arif Rahman</td>
                                    <td class="p-3 text-center">
                                        <input type="checkbox" checked class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500">
                                    </td>
                                </tr>
                                <tr>
                                    <td class="p-3 font-bold">02</td>
                                    <td class="p-3 font-medium text-gray-900">Nusrat Jahan</td>
                                    <td class="p-3 text-center">
                                        <input type="checkbox" checked class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500">
                                    </td>
                                </tr>
                                <tr>
                                    <td class="p-3 font-bold">03</td>
                                    <td class="p-3 font-medium text-gray-900">Sayan Ghosh</td>
                                    <td class="p-3 text-center">
                                        <input type="checkbox" class="w-4 h-4 text-emerald-600 border-gray-300 rounded focus:ring-emerald-500">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <button type="button" onclick="alert('Attendance saved securely for today!')" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-emerald-700 transition">Submit Attendance</button>
                </div>

                <!-- Marks Entry Sheet -->
                <div class="bg-white p-6 rounded-xl border shadow-sm">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-pen-to-square text-indigo-600 mr-2"></i> Marks Entry (Mathematics)</h3>
                    <form class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Examination</label>
                                <select class="w-full p-2 border rounded-lg text-sm bg-white outline-none">
                                    <option>1st Terminal Exam</option>
                                    <option>Mid-Term Exam</option>
                                    <option>Annual Exam</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Max Marks</label>
                                <input type="number" value="100" class="w-full p-2 bg-gray-50 border rounded-lg text-sm font-bold text-gray-500 outline-none" readonly>
                            </div>
                        </div>
                        
                        <div class="space-y-2 max-h-48 overflow-y-auto border p-2 rounded-lg bg-gray-50/50">
                            <div class="flex justify-between items-center bg-white border p-2 rounded-lg shadow-sm">
                                <span class="text-xs font-semibold text-gray-700">Roll 01: Arif Rahman</span>
                                <input type="number" class="w-20 p-1 border rounded text-center text-xs outline-none focus:border-indigo-500" placeholder="Score" min="0" max="100">
                            </div>
                            <div class="flex justify-between items-center bg-white border p-2 rounded-lg shadow-sm">
                                <span class="text-xs font-semibold text-gray-700">Roll 02: Nusrat Jahan</span>
                                <input type="number" class="w-20 p-1 border rounded text-center text-xs outline-none focus:border-indigo-500" placeholder="Score" min="0" max="100">
                            </div>
                            <div class="flex justify-between items-center bg-white border p-2 rounded-lg shadow-sm">
                                <span class="text-xs font-semibold text-gray-700">Roll 03: Sayan Ghosh</span>
                                <input type="number" class="w-20 p-1 border rounded text-center text-xs outline-none focus:border-indigo-500" placeholder="Score" min="0" max="100">
                            </div>
                        </div>

                        <button type="button" onclick="alert('Grades pushed to student cards successfully!')" class="w-full bg-indigo-600 text-white p-2.5 rounded-lg font-bold text-sm hover:bg-indigo-700 transition">Publish Results</button>
                    </form>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
